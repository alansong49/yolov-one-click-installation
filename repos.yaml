python_versions:
  - "3.11"
  - "3.10"
  - "3.9"
  - "3.8"

pytorch_versions:
  - "latest"
  - "2.5.1"
  - "2.4.1"
  - "2.3.1"
  - "2.2.2"
  - "2.1.2"

yolo_versions:
  - name: "YOLOv5 (官方原版)"
    mode: "source"
    install_method: "requirements"
    git_urls:
      - "https://gitee.com/ultralytics/yolov5.git"
      - "https://gitcode.com/ultralytics/yolov5.git"
      - "https://github.com/ultralytics/yolov5.git"
      - "https://gitclone.com/github.com/ultralytics/yolov5.git"
      - "https://gh.api.99988866.xyz/https://github.com/ultralytics/yolov5.git"
    python_version: "3.10"
    env_name: "yolov5_env"
    folder_name: "yolov5"
    recommended_pytorch: "2.5.1"
    test_weight: "yolov5s.pt"

  - name: "YOLOv7 (官方原版)"
