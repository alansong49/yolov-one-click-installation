workspace_dir: "yolo_workspace"

annotation_tools:
  - name: "不安装标注工具"
    pkg_name: ""
    description: "仅部署 YOLO 环境，不安装标注工具"
  - name: "LabelImg (YOLO 格式标注)"
    pkg_name: "labelImg"
    description: "经典的图像标注工具，支持 YOLO/Pascal VOC 格式"
  - name: "LabelMe (多格式标注)"
    pkg_name: "labelme"
    description: "支持多边形标注，可转换为 YOLO/COCO/VOC 格式"
  - name: "LabelImg + LabelMe (全部安装)"
    pkg_name: "both"
    description: "同时安装两个标注工具，满足不同标注需求"
