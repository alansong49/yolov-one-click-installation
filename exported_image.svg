<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变定义 -->
  <defs>
    <!-- 基底蓝渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#165DFF"/>
      <stop offset="100%" stop-color="#0F42C9"/>
    </linearGradient>
    <!-- 进度橙渐变 -->
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7D00"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </linearGradient>
    <!-- 齿轮青渐变 -->
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36CFC9"/>
      <stop offset="100%" stop-color="#22A8A3"/>
    </linearGradient>
    <!-- YOLO圆点渐变 -->
    <radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAA44"/>
      <stop offset="100%" stop-color="#FF5500"/>
    </radialGradient>
  </defs>

  <!-- 底层圆角基底 -->
  <rect width="512" height="512" rx="60" fill="url(#bgGrad)"/>
  <!-- 四角跨平台微标识 -->
  <rect x="30" y="30" width="12" height="12" fill="#ffffff" opacity="0.7"/>
  <line x1="470" y1="482" x2="490" y2="482" stroke="#ffffff" stroke-width="3" opacity="0.7"/>

  <!-- 左侧YOLO双层检测框 -->
  <rect x="70" y="170" width="170" height="135" stroke="#fff" stroke-width="5" fill="none" rx="4"/>
  <rect x="80" y="180" width="150" height="115" stroke="#fff" stroke-width="2" fill="none" rx="3"/>
  <!-- YOLO中心识别点 -->
  <circle cx="155" cy="237" r="14" fill="url(#dotGrad)"/>
  <!-- Conda迷你绿叶 -->
  <path d="M225 280 Q240 265 255 280 Q240 295 225 280" fill="#36CFC9"/>

  <!-- 右侧三组镂空咬合齿轮 -->
  <g fill="url(#gearGrad)">
    <!-- 大齿轮 -->
    <circle cx="350" cy="210" r="42" fill="none" stroke="url(#gearGrad)" stroke-width="10"/>
    <rect x="342" y="160" width="16" height="100" rx="4"/>
    <rect x="290" y="202" width="100" height="16" rx="4"/>
    <!-- 中齿轮 -->
    <circle cx="410" cy="245" r="32" fill="none" stroke="url(#gearGrad)" stroke-width="8"/>
    <rect x="404" y="208" width="12" height="74" rx="3"/>
    <rect x="368" y="239" width="74" height="12" rx="3"/>
    <!-- 小齿轮 -->
    <circle cx="445" cy="270" r="22" fill="none" stroke="url(#gearGrad)" stroke-width="6"/>
    <rect x="440" y="244" width="10" height="52" rx="2"/>
    <rect x="419" y="265" width="52" height="10" rx="2"/>
  </g>

  <!-- 贯穿流线进度轨道 -->
  <rect x="50" y="335" width="412" height="18" rx="9" fill="url(#trackGrad)"/>
  <!-- 流动光点装饰 -->
  <circle cx="65" cy="344" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="447" cy="344" r="4" fill="#fff" opacity="0.8"/>

  <!-- 底部文字 -->
  <text x="256" y="428" text-anchor="middle" fill="#ffffff" font-size="22" font-family="sans-serif" opacity="0.95">YOLO AutoInstaller</text>
</svg>
